version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    ignore:
      # Majors are framework migrations (Angular, zod, vitest), not routine
      # patching. Left to Dependabot they sit open and fail CI indefinitely.
      # Do them deliberately: unignore the one package, migrate, re-ignore.
      # Dependabot alerts still fire, so a CVE stays visible either way.
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    groups:
      # OTel ships its packages in lockstep; a partial bump splits the
      # API/SDK versions and breaks the tracer at runtime, not at build.
      opentelemetry:
        patterns:
          - '@opentelemetry/*'
      langchain:
        patterns:
          - '@langchain/*'
          - 'langchain'
          - 'langsmith'
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    groups:
      actions:
        patterns:
          - '*'

  # One block per image rather than a `directories` list. Both forms are
  # documented, but a dependabot.yml cannot be validated until it is on the
  # default branch, and a config that fails to parse fails silently, which is
  # the exact rot this file exists to prevent. `directory` is the form with no
  # ambiguity, and the semantics are identical.
  - package-ecosystem: docker
    directory: /apps/console
    schedule:
      interval: weekly
      day: monday
      time: '06:00'

  - package-ecosystem: docker
    directory: /apps/agent-service
    schedule:
      interval: weekly
      day: monday
      time: '06:00'

  - package-ecosystem: docker
    directory: /apps/gateway
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
